<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feladatkezelő</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== NAVIGÁCIÓ ===== -->
<nav class="navbar">
    <span class="navbar-brand">✓ Feladatkezelő</span>
    <div class="navbar-right">
        <span id="nav-username" class="nav-username"></span>
        <button id="logout-btn" class="btn btn-outline" onclick="logout()" style="display:none">Kilépés</button>
    </div>
</nav>

<!-- ===== AUTH SZEKCIÓ (login / regisztráció) ===== -->
<div id="auth-section" class="container">
    <div class="auth-card">
        <!-- Fül választó -->
        <div class="tab-bar">
            <button class="tab active" onclick="switchTab('login')">Bejelentkezés</button>
            <button class="tab" onclick="switchTab('register')">Regisztráció</button>
        </div>

        <!-- Bejelentkezés -->
        <div id="login-form">
            <h2>Bejelentkezés</h2>
            <div class="form-group">
                <label>Felhasználónév</label>
                <input type="text" id="login-username" placeholder="pl. kovacs_janos">
            </div>
            <div class="form-group">
                <label>Jelszó</label>
                <input type="password" id="login-password" placeholder="••••••">
            </div>
            <p id="login-error" class="error-msg"></p>
            <button class="btn btn-primary full-width" onclick="login()">Bejelentkezés</button>
        </div>

        <!-- Regisztráció -->
        <div id="register-form" style="display:none">
            <h2>Regisztráció</h2>
            <div class="form-group">
                <label>Felhasználónév</label>
                <input type="text" id="reg-username" placeholder="pl. kovacs_janos">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="pelda@email.com">
            </div>
            <div class="form-group">
                <label>Jelszó (min. 6 karakter)</label>
                <input type="password" id="reg-password" placeholder="••••••">
            </div>
            <p id="reg-error" class="error-msg"></p>
            <p id="reg-success" class="success-msg"></p>
            <button class="btn btn-primary full-width" onclick="register()">Regisztráció</button>
        </div>
    </div>
</div>

<!-- ===== FELADAT SZEKCIÓ ===== -->
<div id="task-section" class="container" style="display:none">

    <!-- Felső sor: szűrő + új feladat gomb -->
    <div class="task-toolbar">
        <div class="filter-group">
            <label>Szűrés:</label>
            <select id="status-filter" onchange="loadTasks()">
                <option value="">Összes</option>
                <option value="TODO">Elvégzendő</option>
                <option value="IN_PROGRESS">Folyamatban</option>
                <option value="DONE">Kész</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="openModal()">+ Új feladat</button>
    </div>

    <!-- Feladat kártyák -->
    <div id="task-list" class="task-grid"></div>
    <p id="empty-msg" class="empty-msg" style="display:none">Nincs feladat ebben a kategóriában.</p>
</div>

<!-- ===== MODAL: Feladat létrehozás / szerkesztés ===== -->
<div id="task-modal" class="modal-overlay" style="display:none" onclick="closeModalOutside(event)">
    <div class="modal-card">
        <h3 id="modal-title">Új feladat</h3>
        <input type="hidden" id="task-id">

        <div class="form-group">
            <label>Cím *</label>
            <input type="text" id="task-title" placeholder="Feladat neve">
        </div>
        <div class="form-group">
            <label>Leírás</label>
            <textarea id="task-desc" rows="3" placeholder="Részletek..."></textarea>
        </div>
        <div class="form-group">
            <label>Státusz</label>
            <select id="task-status">
                <option value="TODO">Elvégzendő</option>
                <option value="IN_PROGRESS">Folyamatban</option>
                <option value="DONE">Kész</option>
            </select>
        </div>
        <div class="form-group">
            <label>Határidő (opcionális)</label>
            <input type="datetime-local" id="task-deadline">
        </div>

        <p id="task-error" class="error-msg"></p>

        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal()">Mégse</button>
            <button class="btn btn-primary" onclick="saveTask()">Mentés</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
