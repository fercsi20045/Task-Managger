name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # --- BUILD & TEST ---
  build-and-test:
    name: Build és tesztek futtatása
    runs-on: ubuntu-latest

    steps:
      - name: Kód checkout
        uses: actions/checkout@v4

      - name: Java 17 beállítása
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven build és tesztek
        run: mvn verify

      - name: Teszt eredmények feltöltése
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  # --- DOCKER BUILD ---
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Kód checkout
        uses: actions/checkout@v4

      - name: Docker Buildx beállítása
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub bejelentkezés
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker image build és push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/taskmanager:latest
            ${{ secrets.DOCKER_USERNAME }}/taskmanager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
